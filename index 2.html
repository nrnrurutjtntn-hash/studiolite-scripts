<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Lite Scripts — مكتبة السكربتات</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">

<style>
/* ═══════════════════════════════════════
   DESIGN SYSTEM — Studio Lite Scripts
   Theme: Terminal-Noir / Cyber-Minimal
   ═══════════════════════════════════════ */
:root {
  --c-bg:       #070c0b;
  --c-bg2:      #0c1412;
  --c-bg3:      #111c1a;
  --c-card:     #0e1816;
  --c-card2:    #131f1d;
  --c-border:   rgba(0,210,165,0.14);
  --c-border2:  rgba(0,210,165,0.07);
  --c-teal:     #00d2a5;
  --c-teal2:    #00b88f;
  --c-teal-g:   rgba(0,210,165,0.12);
  --c-teal-g2:  rgba(0,210,165,0.05);
  --c-text:     #dff2ed;
  --c-text2:    #7db5ab;
  --c-text3:    #3d7a71;
  --c-red:      #ff5f6d;
  --c-yellow:   #ffd166;
  --c-blue:     #4fc3f7;
  --c-star:     #ffc107;
  --r-sm: 10px; --r-md: 14px; --r-lg: 18px; --r-xl: 24px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Tajawal', sans-serif;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --glow: 0 0 20px rgba(0,210,165,0.15);
}

/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--c-bg);
  color: var(--c-text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── GRID BG ── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(0,210,165,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,210,165,0.03) 0%, transparent 60%),
    linear-gradient(rgba(0,210,165,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,210,165,0.03) 1px, transparent 1px);
  background-size: auto, auto, 44px 44px, 44px 44px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--c-border); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:var(--c-teal); }

/* ══════════════════════════════════════
   NAV
   ══════════════════════════════════════ */
.nav {
  position:sticky; top:0; z-index:200;
  height:58px;
  background: rgba(7,12,11,0.88);
  backdrop-filter: blur(20px) saturate(1.5);
  border-bottom: 1px solid var(--c-border);
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 28px;
}
.nav-logo {
  display:flex; align-items:center; gap:10px;
  font-weight:900; font-size:1.1rem; color:var(--c-teal);
  text-decoration:none; letter-spacing:-0.3px;
}
.nav-logo-icon {
  width:30px; height:30px; border-radius:8px;
  background: var(--c-teal-g);
  border: 1px solid var(--c-border);
  display:flex; align-items:center; justify-content:center;
  font-size:0.85rem;
  box-shadow: var(--glow);
  animation: logoBreath 3s ease-in-out infinite;
}
@keyframes logoBreath {
  0%,100%{box-shadow:0 0 10px rgba(0,210,165,0.2)}
  50%{box-shadow:0 0 22px rgba(0,210,165,0.45)}
}
.nav-right { display:flex; align-items:center; gap:8px; }

.nav-btn {
  height:34px; padding:0 14px;
  border-radius:var(--r-sm);
  border: 1px solid var(--c-border);
  background: var(--c-card);
  color: var(--c-text2);
  font-family:var(--sans); font-size:0.82rem; font-weight:600;
  cursor:pointer;
  display:flex; align-items:center; gap:6px;
  transition: all 0.18s;
}
.nav-btn:hover { border-color:var(--c-teal); color:var(--c-teal); background:var(--c-teal-g2); }
.nav-btn.primary { background:var(--c-teal); color:var(--c-bg); border-color:var(--c-teal); font-weight:700; }
.nav-btn.primary:hover { opacity:0.88; }

/* ══════════════════════════════════════
   HERO
   ══════════════════════════════════════ */
.hero {
  position:relative; z-index:1;
  padding: 64px 28px 48px;
  text-align:center;
}
.hero-badge {
  display:inline-flex; align-items:center; gap:7px;
  background: var(--c-teal-g);
  border: 1px solid var(--c-border);
  border-radius:20px;
  padding: 5px 16px;
  font-size:0.75rem; font-weight:700; letter-spacing:1.2px;
  color:var(--c-teal); text-transform:uppercase;
  margin-bottom:24px;
}
.hero-badge-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--c-teal);
  animation: blink 1.4s steps(1) infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.hero h1 {
  font-size: clamp(2rem,5.5vw,3.6rem);
  font-weight:900; line-height:1.12;
  letter-spacing:-1px; margin-bottom:16px;
}
.hero h1 em {
  font-style:normal;
  color:transparent;
  background: linear-gradient(135deg, var(--c-teal), #00e8c8, var(--c-teal2));
  -webkit-background-clip:text; background-clip:text;
}
.hero-sub {
  color:var(--c-text2); font-size:1.02rem;
  max-width:500px; margin:0 auto 36px;
  line-height:1.75;
}

/* ── SEARCH ── */
.search-bar {
  position:relative; max-width:560px; margin:0 auto;
}
.search-bar input {
  width:100%; height:52px;
  padding: 0 20px 0 50px;
  background: var(--c-card);
  border: 1.5px solid var(--c-border);
  border-radius:var(--r-lg);
  color:var(--c-text); font-family:var(--sans); font-size:0.97rem;
  outline:none;
  transition: all 0.2s;
}
.search-bar input:focus { border-color:var(--c-teal); box-shadow:0 0 0 3px var(--c-teal-g); }
.search-bar input::placeholder { color:var(--c-text3); }
.search-bar .s-icon {
  position:absolute; left:17px; top:50%; transform:translateY(-50%);
  color:var(--c-text3); font-size:1rem; pointer-events:none;
  transition: color 0.2s;
}
.search-bar input:focus ~ .s-icon { color:var(--c-teal); }
.search-bar .s-clear {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--c-text3);
  cursor:pointer; font-size:1rem; padding:4px;
  display:none; border-radius:6px;
  transition: color 0.15s;
}
.search-bar .s-clear:hover { color:var(--c-red); }
.search-bar.has-value .s-clear { display:block; }

/* ══════════════════════════════════════
   STATS STRIP
   ══════════════════════════════════════ */
.stats-strip {
  position:relative; z-index:1;
  display:flex; justify-content:center; gap:0;
  padding: 0 28px 40px;
}
.stat-item {
  padding: 16px 32px;
  border: 1px solid var(--c-border2);
  text-align:center;
  position:relative;
}
.stat-item:first-child { border-radius:var(--r-md) 0 0 var(--r-md); }
.stat-item:last-child  { border-radius:0 var(--r-md) var(--r-md) 0; }
.stat-item:not(:first-child) { border-left:none; }
.stat-item::before {
  content:'';position:absolute;inset:0;
  background:var(--c-teal-g2);
  opacity:0; transition:opacity 0.2s;
}
.stat-item:hover::before { opacity:1; }
.stat-num { font-size:1.8rem; font-weight:900; color:var(--c-teal); font-family:var(--mono); }
.stat-lbl { font-size:0.73rem; color:var(--c-text3); margin-top:3px; letter-spacing:0.5px; }

/* ══════════════════════════════════════
   CATEGORIES
   ══════════════════════════════════════ */
.cats-section {
  position:relative; z-index:1;
  padding: 0 28px 28px;
  display:flex; align-items:center; gap:8px;
  overflow-x:auto; scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.cats-section::-webkit-scrollbar { display:none; }

.cat-pill {
  flex-shrink:0;
  padding: 7px 18px;
  border-radius:20px;
  border: 1.5px solid var(--c-border);
  background: transparent;
  color: var(--c-text2);
  font-family:var(--sans); font-size:0.83rem; font-weight:600;
  cursor:pointer; white-space:nowrap;
  display:flex; align-items:center; gap:6px;
  transition: all 0.18s;
}
.cat-pill:hover { border-color:var(--c-teal); color:var(--c-teal); background:var(--c-teal-g2); }
.cat-pill.active {
  border-color:var(--c-teal); color:var(--c-bg);
  background:var(--c-teal); font-weight:700;
}
.cat-pill .cat-count {
  background: rgba(0,0,0,0.2);
  padding:1px 7px; border-radius:10px;
  font-size:0.72rem;
}
.cat-pill.active .cat-count { background:rgba(0,0,0,0.25); }

/* ══════════════════════════════════════
   MAIN LAYOUT
   ══════════════════════════════════════ */
.layout {
  position:relative; z-index:1;
  max-width:1160px; margin:0 auto;
  padding: 0 28px 100px;
  display:grid;
  grid-template-columns: 1fr;
  gap:20px;
}
.list-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:4px;
}
.list-title {
  font-size:0.83rem; font-weight:700; color:var(--c-text2);
  display:flex; align-items:center; gap:8px;
  text-transform:uppercase; letter-spacing:0.8px;
}
.list-title::before {
  content:''; width:3px; height:14px; border-radius:2px;
  background:var(--c-teal); display:block;
  box-shadow:0 0 8px var(--c-teal);
}
.list-meta { font-size:0.78rem; color:var(--c-text3); }
.list-sort {
  padding:6px 12px;
  border-radius:8px; border:1px solid var(--c-border);
  background:var(--c-card); color:var(--c-text2);
  font-family:var(--sans); font-size:0.8rem; cursor:pointer;
  outline:none;
}

/* ══════════════════════════════════════
   SCRIPT CARDS
   ══════════════════════════════════════ */
.scripts-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(340px,1fr));
  gap:14px;
}

.s-card {
  background:var(--c-card);
  border: 1px solid var(--c-border2);
  border-radius:var(--r-lg);
  overflow:hidden;
  cursor:pointer;
  transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
  animation: cardIn 0.35s ease both;
  position:relative;
}
.s-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--c-teal), transparent);
  opacity:0; transition:opacity 0.22s;
}
@keyframes cardIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.s-card:hover {
  border-color:var(--c-teal);
  box-shadow:0 0 28px rgba(0,210,165,0.1), 0 4px 20px rgba(0,0,0,0.3);
  transform:translateY(-2px);
}
.s-card:hover::before { opacity:1; }

.s-card-top { padding:16px 18px 12px; }
.s-card-row1 { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:8px; }
.s-card-name { font-size:0.97rem; font-weight:700; line-height:1.35; color:var(--c-text); }
.s-card-cat {
  flex-shrink:0; padding:3px 10px; border-radius:8px;
  font-size:0.7rem; font-weight:700; letter-spacing:0.3px;
  background:var(--c-teal-g); color:var(--c-teal);
  border:1px solid var(--c-border);
}
.s-card-desc { font-size:0.83rem; color:var(--c-text2); line-height:1.65; }

/* Rating */
.s-card-rating { display:flex; align-items:center; gap:4px; margin-top:8px; }
.stars { color:var(--c-text3); font-size:0.8rem; letter-spacing:1px; }
.stars .filled { color:var(--c-star); }
.rating-num { font-size:0.75rem; color:var(--c-text3); }

/* Code preview */
.s-card-code {
  margin:0 18px;
  background:var(--c-bg2);
  border:1px solid var(--c-border2);
  border-radius:var(--r-sm);
  padding:10px 12px;
  font-family:var(--mono); font-size:0.72rem;
  color:#88b8b0; line-height:1.55;
  max-height:70px; overflow:hidden;
  position:relative;
}
.s-card-code::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:30px;
  background:linear-gradient(transparent,var(--c-bg2));
}

.s-card-foot {
  padding:10px 18px 14px;
  display:flex; align-items:center; justify-content:space-between;
  margin-top:10px;
}
.s-card-meta { display:flex; align-items:center; gap:12px; }
.s-meta-item { font-size:0.73rem; color:var(--c-text3); display:flex; align-items:center; gap:4px; }

.btn-copy-card {
  height:32px; padding:0 16px;
  border-radius:8px;
  border:1.5px solid var(--c-teal);
  background:var(--c-teal-g);
  color:var(--c-teal); font-family:var(--sans);
  font-size:0.8rem; font-weight:700;
  cursor:pointer; display:flex; align-items:center; gap:5px;
  transition:all 0.18s;
}
.btn-copy-card:hover { background:var(--c-teal); color:var(--c-bg); }
.btn-copy-card.done { background:var(--c-teal); color:var(--c-bg); }

/* ══════════════════════════════════════
   MODAL BASE
   ══════════════════════════════════════ */
.overlay {
  display:none; position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);
  align-items:center; justify-content:center;
  padding:16px;
}
.overlay.open { display:flex; }

.modal {
  background:var(--c-card);
  border:1px solid var(--c-border);
  border-radius:var(--r-xl);
  width:100%; max-width:720px;
  max-height:88vh;
  display:flex; flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,210,165,0.08);
  animation:modalPop 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalPop { from{opacity:0;transform:scale(0.94)} to{opacity:1;transform:scale(1)} }

.modal-head {
  padding:18px 22px;
  border-bottom:1px solid var(--c-border2);
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  flex-shrink:0;
}
.modal-head-left { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
.modal-htitle { font-size:1.08rem; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.modal-hcat {
  flex-shrink:0; padding:3px 12px; border-radius:8px;
  font-size:0.72rem; font-weight:700;
  background:var(--c-teal-g); color:var(--c-teal); border:1px solid var(--c-border);
}
.btn-close {
  flex-shrink:0; width:32px; height:32px; border-radius:8px;
  border:1px solid var(--c-border); background:var(--c-card2);
  color:var(--c-text2); cursor:pointer; font-size:0.9rem;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.btn-close:hover { border-color:var(--c-red); color:var(--c-red); background:rgba(255,95,109,0.08); }

.modal-body { padding:20px 22px; overflow-y:auto; flex:1; }
.m-section { margin-bottom:20px; }
.m-label { font-size:0.75rem; font-weight:800; color:var(--c-text3); text-transform:uppercase; margin-bottom:8px; display:block; }
.m-desc { font-size:0.88rem; color:var(--c-text2); line-height:1.75; }

/* Code block */
.m-code-wrap {
  background:var(--c-bg2);
  border:1px solid var(--c-border);
  border-radius:var(--r-md); overflow:hidden;
  margin-bottom:16px;
}
.m-code-wrap pre { margin:0; }
.m-code-wrap code {
  padding:16px;
  font-family:var(--mono); font-size:0.78rem; line-height:1.7;
  max-height:320px; overflow-y:auto;
  display:block;
  background:transparent !important;
}

.m-actions { display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:20px; }
.btn-copy-big {
  height:48px; border-radius:var(--r-md); border:none;
  background:var(--c-teal); color:var(--c-bg);
  font-family:var(--sans); font-size:0.95rem; font-weight:800;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all 0.2s;
}
.btn-copy-big:hover { transform:translateY(-2px); opacity:0.9; }

.rating-box {
  background:var(--c-bg2); border:1px solid var(--c-border);
  border-radius:var(--r-md); padding:0 16px;
  display:flex; align-items:center; justify-content:space-between;
}
.rating-stars { display:flex; gap:4px; }
.rstar { font-size:1.3rem; cursor:pointer; color:var(--c-text3); transition:all 0.15s; }
.rstar:hover, .rstar.active { color:var(--c-star); transform:scale(1.2); }

/* Comments */
.comments-wrap { border-top:1px solid var(--c-border2); padding-top:20px; }
.comment-item { background:var(--c-bg3); border:1px solid var(--c-border2); border-radius:10px; padding:12px 16px; margin-bottom:10px; }
.comment-name { font-size:0.75rem; font-weight:700; color:var(--c-teal); margin-bottom:4px; }
.comment-text { font-size:0.83rem; color:var(--c-text2); line-height:1.6; }
.no-comments { font-size:0.82rem; color:var(--c-text3); text-align:center; padding:20px 0; }

.add-comment { margin-top:20px; }
.comment-inputs { display:grid; gap:10px; }
.comment-inputs input, .comment-inputs textarea {
  background:var(--c-bg2); border:1px solid var(--c-border);
  border-radius:var(--r-md); padding:10px 14px;
  color:white; font-family:var(--sans); font-size:0.88rem; outline:none;
}
.comment-inputs textarea { height:80px; resize:none; }
.btn-send-comment {
  height:40px; border-radius:var(--r-md); border:none;
  background:var(--c-teal-g); color:var(--c-teal);
  font-family:var(--sans); font-size:0.88rem; font-weight:700; cursor:pointer;
  transition:all 0.2s;
}
.btn-send-comment:hover { background:var(--c-teal); color:var(--c-bg); }

/* ══════════════════════════════════════
   ADMIN MODAL
   ══════════════════════════════════════ */
.admin-grid { display:grid; gap:18px; }
.form-group { display:flex; flex-direction:column; gap:8px; }
.form-group label { font-size:0.75rem; font-weight:800; color:var(--c-text3); text-transform:uppercase; }
.form-group input, .form-group select, .form-group textarea {
  background:var(--c-bg); border:1px solid var(--c-border);
  border-radius:var(--r-md); padding:12px 16px;
  color:white; font-family:var(--sans); font-size:0.92rem; outline:none;
}
.form-group textarea { font-family:var(--mono); font-size:0.82rem; height:200px; }

.admin-actions { display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:10px; }
.btn-admin {
  height:48px; border-radius:var(--r-md); border:none;
  font-family:var(--sans); font-size:0.95rem; font-weight:800; cursor:pointer;
  transition:all 0.2s;
}
.btn-admin.save { background:var(--c-teal); color:var(--c-bg); }
.btn-admin.cancel { background:var(--c-bg3); color:var(--c-text2); border:1px solid var(--c-border); }

/* TOAST */
.toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px);
  z-index:1000; padding:12px 24px; border-radius:12px;
  background:var(--c-card); border:1px solid var(--c-teal);
  color:var(--c-teal); font-weight:700; font-size:0.9rem;
  transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
}
.toast.show { transform:translateX(-50%) translateY(0); }

.footer { text-align:center; padding:60px 28px; border-top:1px solid var(--c-border2); color:var(--c-text3); font-size:0.85rem; }

@media (max-width: 600px) {
  .nav { padding: 0 16px; }
  .hero { padding: 48px 16px 32px; }
  .m-actions { grid-template-columns: 1fr; }
  .admin-actions { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="nav">
  <a href="#" class="nav-logo">
    <div class="nav-logo-icon">SL</div>
    Studio Lite
  </a>
  <div class="nav-right">
    <button class="nav-btn" id="themeBtn">🌙 ليلي</button>
    <button class="nav-btn primary" onclick="openAdmin()">⚙️ الإدارة</button>
  </div>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCViFGlAanlpehk--jhnDNI0HyqfUWx5Ls",
  authDomain: "studiolite-scripts.firebaseapp.com",
  projectId: "studiolite-scripts",
  storageBucket: "studiolite-scripts.firebasestorage.app",
  messagingSenderId: "118435376645",
  appId: "1:118435376645:web:9d042fbfd5f7228544366c",
  measurementId: "G-G7EYRCF60B"
};

let db = null;
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
} catch (e) { console.error(e); }

let scripts = [];
let copies = {};
let ratings = {};
let comments = {};
let userRatings = {};
let activeCat = 'الكل';
let activeScript = null;

init();

function init() {
    const s = localStorage.getItem('sl2_scripts');
    if (s) {
        scripts = JSON.parse(s);
        copies = JSON.parse(localStorage.getItem('sl2_copies') || '{}');
        ratings = JSON.parse(localStorage.getItem('sl2_ratings') || '{}');
        comments = JSON.parse(localStorage.getItem('sl2_comments') || '{}');
        userRatings = JSON.parse(localStorage.getItem('sl2_uratings') || '{}');
    } else {
        scripts = [{id:'d1', name:'نظام الطيران', cat:'حركة', desc:'سكربت طيران', code:'-- Fly code'}];
    }
    
    if (db) {
        db.collection("data").doc("appState").onSnapshot(doc => {
            if (doc.exists) {
                const d = doc.data();
                scripts = d.scripts || scripts;
                copies = d.copies || copies;
                ratings = d.ratings || ratings;
                comments = d.comments || comments;
                localStorage.setItem('sl2_scripts', JSON.stringify(scripts));
                renderCats(); renderScripts();
            }
        });
    }
    renderCats(); renderScripts();
}

function save() {
    localStorage.setItem('sl2_scripts', JSON.stringify(scripts));
    localStorage.setItem('sl2_copies', JSON.stringify(copies));
    localStorage.setItem('sl2_ratings', JSON.stringify(ratings));
    localStorage.setItem('sl2_comments', JSON.stringify(comments));
    if (db) {
        db.collection("data").doc("appState").set({scripts, copies, ratings, comments, userRatings});
    }
}

function renderCats() {
    const cats = ['الكل', ...new Set(scripts.map(s=>s.cat))];
    const sec = document.getElementById('catsSection');
    sec.innerHTML = '';
    cats.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'cat-pill' + (c===activeCat?' active':'');
        btn.textContent = c;
        btn.onclick = () => { activeCat=c; renderCats(); renderScripts(); };
        sec.appendChild(btn);
    });
}

function renderScripts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let list = scripts.filter(s => (activeCat==='الكل' || s.cat===activeCat) && (s.name.toLowerCase().includes(q)));
    const grid = document.getElementById('scriptsGrid');
    grid.innerHTML = '';
    document.getElementById('listMeta').textContent = list.length + ' سكربت';
    list.forEach(s => {
        const card = document.createElement('div');
        card.className = 's-card';
        card.innerHTML = `<div class="s-card-top"><div class="s-card-name">${s.name}</div></div><div class="s-card-foot"><button class="btn-copy-card" onclick="quickCopy(event,'${s.id}')">نسخ</button></div>`;
        card.onclick = () => openScript(s.id);
        grid.appendChild(card);
    });
}

function openScript(id) {
    activeScript = scripts.find(s=>s.id===id);
    document.getElementById('mTitle').textContent = activeScript.name;
    document.getElementById('mDesc').textContent = activeScript.desc;
    document.getElementById('mCode').textContent = activeScript.code;
    hljs.highlightElement(document.getElementById('mCode'));
    openOverlay('viewOverlay');
}

function quickCopy(e, id) {
    e.stopPropagation();
    const s = scripts.find(x=>x.id===id);
    navigator.clipboard.writeText(s.code);
    toast('تم النسخ');
}

function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.className = 'toast show';
    setTimeout(()=>t.className='toast', 2000);
}

function openOverlay(id) { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

function openAdmin() { openOverlay('adminOverlay'); }
function checkAdmin() {
    if(document.getElementById('adminPass').value === '1234') {
        document.getElementById('loginSection').style.display='none';
        document.getElementById('adminForm').style.display='block';
    }
}

function saveNewScript() {
    const name = document.getElementById('nName').value;
    const cat = document.getElementById('nCatNew').value;
    const code = document.getElementById('nCode').value;
    scripts.unshift({id:'s'+Date.now(), name, cat, code, desc:document.getElementById('nDesc').value});
    save(); closeOverlay('adminOverlay'); renderCats(); renderScripts();
}
</script>
</body>
</html>
